<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadística Aplicada</title>
    <!-- Enlazamos el CSS externo -->
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <header>
        <h1>Prueba de Hipótesis sobre la Varianza</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="prueba_media.html">PH sobre la Media</a></li>
            <li><a href="prueba_varianza.html">PH sobre la Varianza</a></li>
            <li><a href="anova.html">Análisis de Varianza</a></li>
            <li><a href="potencia_prueba.html">Potencia de una Prueba</a></li>
            <li><a href="analisis_regresion.html">Análisis de Regresión</a></li>
        </ul>
    </nav>
    <div id="container">
        <div id="sidebar">
            <h2>Parámetros</h2>
            <div class="prueba-varianza-parametros">
                <div class="input-container">
                    <label for="tipoTest">Tipo de Prueba:</label>
                    <select id="tipoTest">
                        <option value="right-tailed">Una Cola Derecha</option>
                        <option value="left-tailed">Una Cola Izquierda</option>
                        <option value="two-tailed">Dos Colas</option>
                    </select>
                </div>
                <div class="slider-container">
                    <label for="sigma0">Valor bajo Hipótesis Nula (σ₀²): <span id="sigma0Value" class="slider-value">25</span></label>
                    <input type="range" id="sigma0" min="1" max="100" step="1" value="25">
                </div>
                <div class="slider-container">
                    <label for="s">Varianza Muestral (s²): <span id="sValue" class="slider-value">30</span></label>
                    <input type="range" id="s" min="1" max="100" step="1" value="30">
                </div>
                <div class="slider-container">
                    <label for="n">Tamaño de Muestra (n): <span id="nValue" class="slider-value">7</span></label>
                    <input type="range" id="n" min="2" max="100" step="1" value="7">
                </div>
                <div class="slider-container">
                    <label for="alphaSlider">Nivel de Significancia (α): <span id="alphaValue" class="slider-value">0.05</span></label>
                    <input type="range" id="alphaSlider" min="0.01" max="0.20" step="0.01" value="0.05">
                </div>
                
            </div>
        </div>
        <div id="content">
            <div id="resultadosPruebaVarianza" class="resultado">
                <!-- Aquí se mostrarán los resultados -->
            </div>
            <div id="graficaDistribucionVarianza" style="width: 100%; height: 400px;"></div>
        </div>
    </div>
    <footer>
        &copy; 2024 Estadística Aplicada - dgiuliodori@unc.edu.ar
    </footer>
    <!-- Incluimos las librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.6.4/math.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.4/jstat.min.js"></script>
    <!-- Enlazamos el JavaScript específico para esta sección -->
    <script src="prueba_varianza.js"></script>
</body>
</html>
